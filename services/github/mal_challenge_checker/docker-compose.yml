services:
  myapp:
    build: ../../node_runner
    container_name: mal_challenge_checker
    restart: unless-stopped
    networks:
      - public_proxy
    environment:
      - REPO_URL=git@github.com:thetornadotitan/MAL-Challenge-Checker.git
      - BRANCH=main
      - PORT=3000
      - SSH_PRIVATE_KEY_PATH=/run/secrets/deploy_key
    secrets:
      - deploy_key
    volumes:
      - mal_challenge_checker:/app/src
    labels:
      - traefik.enable=true

      # Routing
      - traefik.http.routers.mal_challenge_checker.rule=Host(`mal.isaachisey.com`)
      - traefik.http.routers.mal_challenge_checker.entrypoints=web
      - traefik.http.services.mal_challenge_checker.loadbalancer.server.port=3000

      # Expose to catalog service
      - traefik.group=public
      - catalog.enable=true
      - catalog.name=MAL Challenege Checker
      - catalog.description=A utility created for searching my Anime List accounts with filtering. Desperately needs updating.

volumes:
  mal_challenge_checker:
    name: mal_challenge_checker

secrets:
  deploy_key:
    file: ${HOME}/secrets/deploy_key

networks:
  public_proxy:
    external: true
    name: public_proxy
