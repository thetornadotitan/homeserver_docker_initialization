services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml
    environment:
      - SEARXNG_BASE_URL=http://192.168.0.150:8082/
    labels:
      - catalog.enable=false
      - catalog.name=SearXNG
      - catalog.description=Local MCP search backend
      - catalog.health.port=8080

      - traefik.enable=true
      - traefik.group=admin

      - traefik.http.routers.searxng.rule=Host(`searxng.hh`)
      - traefik.http.routers.searxng.entrypoints=web
      - traefik.http.routers.searxng.service=searxng
      - traefik.http.services.searxng.loadbalancer.server.port=8080

      - traefik.http.routers.searxng-path.rule=PathPrefix(`/hh/searxng`)
      - traefik.http.routers.searxng-path.entrypoints=web
      - traefik.http.routers.searxng-path.priority=1
      - traefik.http.routers.searxng-path.service=searxng
      - traefik.http.routers.searxng-path.middlewares=searxng-strip
      - traefik.http.middlewares.searxng-strip.stripprefix.prefixes=/hh/searxng

  redis:
    image: valkey/valkey:8-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data: